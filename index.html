<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>觸控筆分析網站介紹</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    :root {
      --bg: #f7faf8;
      --surface: #ffffff;
      --surface-soft: #edf7f1;
      --ink: #17231c;
      --muted: #637369;
      --line: #d7e3dc;
      --brand: #0f7b55;
      --brand-dark: #09543b;
      --accent: #1f6feb;
      --warm: #f59e0b;
      --danger: #dc2626;
      --shadow: 0 22px 60px rgba(18, 45, 31, 0.13);
      --radius: 8px;
      font-family: Inter, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 16px clamp(20px, 5vw, 72px);
      border-bottom: 1px solid rgba(215, 227, 220, 0.78);
      background: rgba(247, 250, 248, 0.92);
      backdrop-filter: blur(14px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--brand);
      font-weight: 900;
    }

    .nav {
      display: flex;
      gap: 18px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 650;
    }

    .nav a:hover {
      color: var(--brand-dark);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 0.94fr) minmax(360px, 1.06fr);
      gap: clamp(32px, 6vw, 78px);
      align-items: center;
      padding: clamp(44px, 7vw, 92px) clamp(20px, 5vw, 72px) 56px;
      min-height: calc(100vh - 66px);
    }
